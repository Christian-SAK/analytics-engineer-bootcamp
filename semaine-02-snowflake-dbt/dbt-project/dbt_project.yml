name: 'ae_bootcamp'
version: '1.0.0'
config-version: 2

profile: 'ae_bootcamp'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ae_bootcamp:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

vars:
  tpch_database: SNOWFLAKE_SAMPLE_DATA
  tpch_schema: TPCH_SF1
